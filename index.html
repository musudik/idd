      <!-- JOIN / MEMBERSHIP ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ -->
      <section id="section-join" class="sp-section page page-join">
        <div class="page-header">
          <div class="page-header-line"></div>
          <h1 class="page-title" id="join-title"></h1>
          <p class="page-subtitle" id="join-subtitle"></p>
        </div>
        <div class="membership-types" id="membership-types"></div>
        <div class="benefits-grid" id="benefits-grid"></div>
        <div class="join-eligibility">
          <h3 id="eligibility-title"></h3>
          <p id="eligibility-text"></p>
          <a href="#section-contact" class="btn btn-primary" id="join-cta"></a>
        </div>
      </section>

      <!-- DONATE ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ -->
      <section id="section-donate" class="sp-section page page-donate">
        <div class="page-header">
          <div class="page-header-line"></div>
          <h1 class="page-title" id="donate-title"></h1>
        </div>
        <p class="section-lead" id="donate-subtitle"></p>
        <div class="donate-layout">
          <div class="donate-reasons" id="donate-reasons"></div>
          <div class="donate-form-wrap">
            <h3 class="donate-form-heading" id="donate-form-title"></h3>
            <div class="amount-selector" id="amount-selector"></div>
            <form class="donate-form" id="donate-form" onsubmit="handleDonateSubmit(event)">
              <div class="form-group">
                <label id="label-donate-name"></label>
                <input type="text" id="input-donate-name" required />
              </div>
              <div class="form-group">
                <label id="label-donate-email"></label>
                <input type="email" id="input-donate-email" required />
              </div>
              <div class="form-group">
                <label id="label-donate-message"></label>
                <textarea id="input-donate-message" rows="3"></textarea>
              </div>
              <button type="submit" class="btn btn-primary" id="btn-donate"></button>
            </form>
          </div>
        </div>
      </section>

      <!-- CONTACT ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ -->

        <div class="page-header">
          <div class="page-header-line"></div>
          <h1 class="page-title" id="contact-title"></h1>
        </div>
        <div class="contact-layout">
          <div class="contact-info">
            <div class="contact-item">
              <span class="contact-icon">&#x1F4CD;</span>
              <span id="contact-address"></span>
            </div>
            <div class="contact-item">
              <span class="contact-icon">&#x2709;&#xFE0F;</span>
              <a id="contact-email" href="mailto:info@indischer-dachverband.de"></a>
            </div>
            <div class="contact-item">
              <span class="contact-icon">&#x1F4DE;</span>
              <span id="contact-phone"></span>
            </div>
            <div class="contact-social" id="contact-social"></div>
          </div>
          <form class="contact-form" id="contact-form" onsubmit="handleContactSubmit(event)">
            <div class="form-group">
              <label id="label-name"></label>
              <input type="text" id="input-name" required />
            </div>
            <div class="form-group">
              <label id="label-email"></label>
              <input type="email" id="input-email" required />
            </div>
            <div class="form-group">
              <label id="label-subject"></label>
              <input type="text" id="input-subject" required />
            </div>
            <div class="form-group">
              <label id="label-message"></label>
              <textarea id="input-message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" id="btn-send"></button>
          </form>
        </div>
      </section>

      <!-- IMPRESSUM & PRIVACY ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ -->
